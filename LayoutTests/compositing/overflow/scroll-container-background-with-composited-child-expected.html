<!DOCTYPE html> <!-- webkit-test-runner [ AsyncOverflowScrollingEnabled=true ] -->
<html>
<head>
    <style>
        body {
            margin: 0;
        }
        .scroller {
            position: fixed;
            top: 0;
            left: 0;
            width: 300px;
            height: 200px;
            overflow: auto;
            background: rgba(0, 0, 0, 0.5);
        }
        .child {
            width: 200px;
            height: 400px;
            margin: 20px auto;
            background: green;
        }
    </style>
</head>
<body>
    <div class="scroller">
        <div class="child"></div>
    </div>
</body>
</html>
