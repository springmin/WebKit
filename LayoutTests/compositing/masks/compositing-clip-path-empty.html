<!DOCTYPE html>

<html>
<head>
    <style>
        .box {
          width: 100px;
          height: 100px;
          background-color: blue;
        }

        .composited {
          transform: translateZ(0);
        }

        .clipped {
          clip-path: inset(50%);
        }
    </style>
</head>
<body>
  <div class="composited box"></div>
  <div class="clipped composited box"></div>
</body>
</html>
