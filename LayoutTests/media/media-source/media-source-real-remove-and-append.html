<!DOCTYPE html>
<html>
<head>
    <title>media-source-real-remove-and-append</title>
    <script src="mp4-generator.js"></script>
    <script src="../video-test.js"></script>
    <script>
    // Tests removing a range from the middle of buffered data, creating a gap,
    // then verifying the gap exists. This exercises the state synchronization
    // between the MSE layer and the renderer after removal — a pattern that
    // exposed reenqueue bugs during the re-architecture.

    var source;
    var sourceBuffer;

    async function runTest() {
        findMediaElement();

        source = new MediaSource();
        video.src = URL.createObjectURL(source);
        await waitFor(source, 'sourceopen');

        sourceBuffer = source.addSourceBuffer(MP4.VIDEO_TYPE);

        var initData = MP4.initSegment({
            timescale: 1000,
            tracks: [{ id: 1, type: 'video', timescale: 1000 }]
        });
        sourceBuffer.appendBuffer(initData);
        await waitFor(sourceBuffer, 'updateend');

        // Append 8 seconds: sync at 0, 2, 4, 6
        var media = MP4.mediaSegment({
            sequenceNumber: 1,
            tracks: [{ id: 1, type: 'video', baseDecodeTime: 0, samples: [
                { duration: 1000, compositionTimeOffset: 0, isSync: true },
                { duration: 1000, compositionTimeOffset: 0, isSync: false },
                { duration: 1000, compositionTimeOffset: 0, isSync: true },
                { duration: 1000, compositionTimeOffset: 0, isSync: false },
                { duration: 1000, compositionTimeOffset: 0, isSync: true },
                { duration: 1000, compositionTimeOffset: 0, isSync: false },
                { duration: 1000, compositionTimeOffset: 0, isSync: true },
                { duration: 1000, compositionTimeOffset: 0, isSync: false },
            ]}]
        });
        sourceBuffer.appendBuffer(media);
        await waitFor(sourceBuffer, 'updateend');

        testExpected('sourceBuffer.buffered.length', 1);
        testExpectedEqualWithTolerance('sourceBuffer.buffered.end(0)', 8, 0.01);

        // Remove [2, 6) — should create a gap since sync frames are at 0,2,4,6
        run('sourceBuffer.remove(2, 6)');
        await waitFor(sourceBuffer, 'updateend');

        // Should have two ranges: [0, 2) and [6, 8)
        testExpected('sourceBuffer.buffered.length', 2);
        testExpectedEqualWithTolerance('sourceBuffer.buffered.start(0)', 0, 0.01);
        testExpectedEqualWithTolerance('sourceBuffer.buffered.end(0)', 2, 0.01);
        testExpectedEqualWithTolerance('sourceBuffer.buffered.start(1)', 6, 0.01);
        testExpectedEqualWithTolerance('sourceBuffer.buffered.end(1)', 8, 0.01);

        endTest();
    }
    </script>
</head>
<body onload="runTest()">
    <video></video>
</body>
</html>
