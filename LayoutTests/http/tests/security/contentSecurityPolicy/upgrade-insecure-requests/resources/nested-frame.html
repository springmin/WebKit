<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
</head>
<body>
<p>This frame has 'upgrade-insecure-requests'. The HTTP script below should be upgraded to HTTPS.</p>
<script>
var directCSPScriptLoaded = false;
var inheritedCSPScriptsLoaded = 0;

window.addEventListener("message", function(e) {
    inheritedCSPScriptsLoaded = e.data.scriptsLoaded;
    reportToParent();
});

function reportToParent() {
    if (window.parent !== window)
        window.parent.postMessage({ directCSPScriptLoaded: directCSPScriptLoaded, inheritedCSPScriptsLoaded: inheritedCSPScriptsLoaded }, '*');
}
</script>
<script onload="directCSPScriptLoaded = true" src="http://127.0.0.1:8443/security/contentSecurityPolicy/resources/alert-pass.js"></script>
<iframe src="https://127.0.0.1:8443/security/contentSecurityPolicy/upgrade-insecure-requests/resources/nested-nested-frame.html"></iframe>
</body>
</html>
