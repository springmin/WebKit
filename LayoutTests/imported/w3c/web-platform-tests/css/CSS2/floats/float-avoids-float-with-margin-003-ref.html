<!DOCTYPE html>
<html>
<head>
<title>CSS Test: Float with margin avoids prior float (reference)</title>
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<style>
.container {
    width: 100px;
    height: 40px;
    font: 20px/1 Ahem;
    position: relative;
}

.first {
    position: absolute;
    top: 0;
    left: 0;
    width: 60px;
    height: 10px;
    background: blue;
}

.second {
    position: absolute;
    top: 10px;
    left: 30px;
    width: 20px;
    height: 20px;
    background: green;
}
</style>
</head>
<body>
<div class="container"><div class="first"></div><div class="second"></div></div>
</body>
</html>
