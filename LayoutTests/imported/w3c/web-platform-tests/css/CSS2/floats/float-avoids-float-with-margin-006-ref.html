<!DOCTYPE html>
<html>
<head>
<title>CSS Test: flow-root with margin fits next to float (reference)</title>
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<style>
.container {
    width: 100px;
    height: 40px;
    font: 20px/1 Ahem;
    position: relative;
}

.float {
    position: absolute;
    top: 0;
    right: 0;
    width: 40px;
    height: 20px;
    background: blue;
}

.bfc {
    position: absolute;
    top: 0;
    left: 20px;
    width: 20px;
    height: 20px;
    background: green;
}
</style>
</head>
<body>
<div class="container"><div class="float"></div><div class="bfc"></div></div>
</body>
</html>
