<!DOCTYPE html>
<html>
<head>
<title>CSS Test: flow-root with margin-left fits next to right float</title>
<link rel="help" href="https://www.w3.org/TR/CSS21/visuren.html#floats">
<link rel="match" href="float-avoids-float-with-margin-006-ref.html">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<meta name="assert" content="A block establishing a new BFC whose border box plus margin fits next to a float should remain on the same line.">
<style>
.container {
    width: 100px;
    height: 40px;
    font: 20px/1 Ahem;
}

.float {
    float: right;
    width: 40px;
    height: 20px;
    background: blue;
}

.bfc {
    display: flow-root;
    width: 20px;
    height: 20px;
    background: green;
    margin-left: 20px;
}
</style>
</head>
<body>
<div class="container">
  <div class="float"></div>
  <div class="bfc"></div>
</div>
</body>
</html>
