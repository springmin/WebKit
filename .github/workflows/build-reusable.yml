name: Build WebKit (Reusable)

env:
  LLVM_VERSION: 21

on:
  workflow_call:
    inputs:
      build_ref:
        description: 'Git ref to build (commit SHA, branch, or tag)'
        type: string
        required: true
      release_tag:
        description: 'Full release tag (including autobuild- prefix)'
        type: string
        required: true
      is_prerelease:
        description: 'Mark release as prerelease'
        type: boolean
        default: false
      llvm_version:
        description: 'LLVM version to use'
        type: string
        default: '19'
    outputs:
      release_tag:
        description: 'The release tag that was created'
        value: ${{ jobs.release.outputs.tag }}

jobs:
  macos:
    name: macOS
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      matrix:
        include:
          - runner: macos-14-large
            cpp_flags: "-D_LIBCXX_ENABLE_ASSERTIONS=1"
            cpu: haswell
            label: bun-webkit-macos-amd64-debug
            brew_prefix: /usr/local/opt
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: Debug
          - runner: macos-14-xlarge
            cpp_flags: "-D_LIBCXX_ENABLE_ASSERTIONS=1"
            cpu: native
            label: bun-webkit-macos-arm64-debug
            brew_prefix: /opt/homebrew/opt
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: Debug
          - runner: macos-14-xlarge
            cpp_flags: "-D_LIBCXX_ENABLE_ASSERTIONS=1"
            cpu: native
            label: bun-webkit-macos-arm64-debug-asan
            brew_prefix: /opt/homebrew/opt
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: Debug
            ENABLE_MALLOC_HEAP_BREAKDOWN: "OFF"
            ENABLE_SANITIZERS: "address,undefined"
          - runner: macos-14-large
            cpp_flags: ""
            cpu: haswell
            label: bun-webkit-macos-amd64
            brew_prefix: /usr/local/opt
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: Release
          - runner: macos-14-xlarge
            cpp_flags: "-D_LIBCXX_ENABLE_ASSERTIONS=0"
            cpu: native
            label: bun-webkit-macos-arm64
            brew_prefix: /opt/homebrew/opt
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: Release
          - runner: macos-14-xlarge
            cpp_flags: "-D_LIBCXX_ENABLE_ASSERTIONS=1"
            cpu: native
            label: bun-webkit-macos-arm64-asan
            brew_prefix: /opt/homebrew/opt
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: Release
            ENABLE_SANITIZERS: "address,undefined"
    steps:
      - name: "Set LLVM version"
        run: echo "LLVM_VERSION=${{ inputs.llvm_version }}" >> $GITHUB_ENV
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.build_ref }}
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !LayoutTests/
            !JSTests/
      - name: PATH
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
          HOMEBREW_NO_ANALYTICS_THIS_RUN: 1
        run: |
          echo "${{matrix.brew_prefix}}/llvm@21/bin" >> $GITHUB_PATH
          brew install llvm@21 python icu4c ninja -f --overwrite
          brew link llvm@21 -f --overwrite
      - name: Run
        env:
          ICU_INCLUDE_DIRS: ${{matrix.brew_prefix}}/icu4c/include
          ICU_ROOT: ${{matrix.brew_prefix}}/icu4c
          LDFLAGS: "${{env.LDFLAGS}} "
          CC: "${{matrix.brew_prefix}}/llvm@21/bin/clang"
          CXX: "${{matrix.brew_prefix}}/llvm@21/bin/clang++"
          RANLIB: "${{matrix.brew_prefix}}/llvm@21/bin/llvm-ranlib"
          AR: "${{matrix.brew_prefix}}/llvm@21/bin/llvm-ar"
          CMAKE_C_COMPILER: "${{matrix.brew_prefix}}/llvm@21/bin/clang"
          CMAKE_CXX_COMPILER: "${{matrix.brew_prefix}}/llvm@21/bin/clang++"
          CMAKE_C_FLAGS: " -fno-exceptions ${{matrix.cpp_flags}} -fvisibility=hidden -fvisibility-inlines-hidden -O3 -fno-omit-frame-pointer -mno-omit-leaf-frame-pointer -faddrsig "
          CMAKE_CXX_FLAGS: " -fno-exceptions ${{matrix.cpp_flags}} -fvisibility=hidden -fvisibility-inlines-hidden -O3 -fno-omit-frame-pointer -mno-omit-leaf-frame-pointer -faddrsig -fno-c++-static-destructors "
          CMAKE_OSX_DEPLOYMENT_TARGET: "13.0"
          CMAKE_BUILD_TYPE: ${{matrix.CMAKE_BUILD_TYPE}}
          PACKAGE_JSON_ARCH: ${{matrix.package_json_arch}}
          PACKAGE_JSON_LABEL: ${{matrix.label}}
          ENABLE_MALLOC_HEAP_BREAKDOWN: ${{matrix.ENABLE_MALLOC_HEAP_BREAKDOWN}}
          ENABLE_SANITIZERS: ${{matrix.ENABLE_SANITIZERS}}
        run: GITHUB_REPOSITORY=$GITHUB_REPOSITORY bash mac-release.bash
      - uses: actions/upload-artifact@v4
        with:
          name: ${{matrix.label}}
          path: ${{runner.temp}}/bun-webkit.tar.gz

  linux:
    name: Linux
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        include:
          - lto_flag: ""
            label: bun-webkit-linux-amd64-debug
            os: linux-x64-gh
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "Debug"
            RELEASE_FLAGS: "-O3 -DNDEBUG=1"
          - lto_flag: ""
            label: bun-webkit-linux-arm64-debug
            os: linux-arm64-gh
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: "Debug"
            RELEASE_FLAGS: "-O3 -DNDEBUG=1"
          - lto_flag: ""
            label: bun-webkit-linux-arm64-debug-asan
            os: linux-arm64-gh
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: "Debug"
            RELEASE_FLAGS: "-O3 -DNDEBUG=1"
            ENABLE_SANITIZERS: "address,undefined"
          - lto_flag: ""
            label: bun-webkit-linux-amd64-debug-asan
            os: linux-x64-gh
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "Debug"
            RELEASE_FLAGS: "-O3 -DNDEBUG=1"
            ENABLE_SANITIZERS: "address,undefined"
          - lto_flag: "-flto=full -fwhole-program-vtables -fforce-emit-vtables"
            label: bun-webkit-linux-arm64-lto
            os: linux-arm64-gh
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: "Release"
            RELEASE_FLAGS: "-O3 -DNDEBUG=1"
          - lto_flag: ""
            label: bun-webkit-linux-arm64
            os: linux-arm64-gh
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: "Release"
            RELEASE_FLAGS: "-O3 -DNDEBUG=1"
          - lto_flag: "-flto=full  -fwhole-program-vtables -fforce-emit-vtables"
            label: bun-webkit-linux-amd64-lto
            os: linux-x64-gh
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "Release"
            RELEASE_FLAGS: "-O3 -DNDEBUG=1"
          - lto_flag: ""
            label: bun-webkit-linux-amd64
            os: linux-x64-gh
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "Release"
            RELEASE_FLAGS: "-O3 -DNDEBUG=1"
          - lto_flag: "-flto=full  -fwhole-program-vtables -fforce-emit-vtables"
            label: bun-webkit-linux-amd64-baseline-lto
            os: linux-x64-gh
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "Release"
            RELEASE_FLAGS: "-O3 -DNDEBUG=1"
            MARCH_FLAG: "-march=nehalem"
          - lto_flag: ""
            label: bun-webkit-linux-amd64-baseline
            os: linux-x64-gh
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "Release"
            RELEASE_FLAGS: "-O3 -DNDEBUG=1"
            MARCH_FLAG: "-march=nehalem"
          - lto_flag: ""
            label: bun-webkit-linux-amd64-asan
            os: linux-x64-gh
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "Release"
            RELEASE_FLAGS: "-O3 -DNDEBUG=1"
            ENABLE_SANITIZERS: "address,undefined"
          - lto_flag: ""
            label: bun-webkit-linux-arm64-asan
            os: linux-arm64-gh
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: "Release"
            RELEASE_FLAGS: "-O3 -DNDEBUG=1"
            ENABLE_SANITIZERS: "address,undefined"
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.build_ref }}
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !LayoutTests/
            !JSTests/
      - uses: docker/setup-buildx-action@v2
        id: buildx
        with:
          install: true
      - name: Run
        env:
          RELEASE_FLAGS: ${{matrix.RELEASE_FLAGS}}
          ENABLE_SANITIZERS: ${{matrix.ENABLE_SANITIZERS}}
        run: |
          rm -rf ${{runner.temp}}/bun-webkit ${{runner.temp}}/bun-webkit.tar.gz
          if [ "${{matrix.package_json_arch}}" = "arm64" ]; then
            export MARCH_FLAG="-march=armv8-a+crc -mtune=ampere1"
          else
            export MARCH_FLAG="${{ matrix.MARCH_FLAG || '-march=haswell' }}"
          fi
          WEBKIT_RELEASE_TYPE=${{matrix.CMAKE_BUILD_TYPE}} CPU="native" cpu=native LTO_FLAG="${{matrix.lto_flag}}" temp=${{runner.temp}} ENABLE_SANITIZERS="${{matrix.ENABLE_SANITIZERS}}" bash release.sh
          cd ${{runner.temp}}
          echo "#define BUN_WEBKIT_VERSION \"${{ inputs.build_ref }}\"" >> bun-webkit/include/cmakeconfig.h
          echo '{ "name": "${{matrix.label}}", "version": "0.0.1-${{ inputs.build_ref }}", "os": ["linux"], "cpu": ["${{matrix.package_json_arch}}"], "repository": "https://github.com/${{github.repository}}" }' > bun-webkit/package.json
          rm -rf bun-webkit/lib/*.so
          rm -rf bun-webkit/lib/*.so.*
          tar -czf bun-webkit.tar.gz bun-webkit
          rm -rf bun-webkit
      - uses: actions/upload-artifact@v4
        with:
          name: ${{matrix.label}}
          path: ${{runner.temp}}/bun-webkit.tar.gz

  windows:
    strategy:
      matrix:
        include:
          - runner: windows
            build-type: Release
            package_json_arch: "x64"
            label: bun-webkit-windows-amd64
            platform: x64
          - runner: windows
            build-type: Debug
            package_json_arch: "x64"
            label: bun-webkit-windows-amd64-debug
            platform: x64
          - runner: windows
            build-type: Release
            package_json_arch: "x64"
            label: bun-webkit-windows-amd64-baseline
            platform: x64
            baseline: true
          - runner: windows-11-arm
            build-type: Release
            package_json_arch: "arm64"
            label: bun-webkit-windows-arm64
            platform: ARM64
          - runner: windows-11-arm
            build-type: Debug
            package_json_arch: "arm64"
            label: bun-webkit-windows-arm64-debug
            platform: ARM64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - name: Install Scoop
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          Join-Path (Resolve-Path ~).Path "scoop\shims" >> $Env:GITHUB_PATH
      - name: Install LLVM and Ninja (x64)
        if: matrix.platform == 'x64'
        # Downloads from 7-zip.org fail with SSL errors on GHA runners.
        # Use the pre-installed 7zip on Windows runners instead.
        run: |
          "C:\Program Files\7-Zip" >> $Env:GITHUB_PATH
          scoop config use_external_7zip true
          scoop install ninja llvm@21.1.8
          Join-Path (Resolve-Path ~).Path "scoop\apps\llvm\current\bin" >> $Env:GITHUB_PATH
      - name: Install LLVM and Ninja (ARM64)
        if: matrix.platform == 'ARM64'
        run: |
          "C:\Program Files\7-Zip" >> $Env:GITHUB_PATH
          scoop config use_external_7zip true
          scoop install ninja
          # Install LLVM ARM64 from official LLVM releases
          # Use LLVM 21 for ARM64 - has better Windows ARM64 support and fixes SEH unwind bugs
          $llvmVersion = "21.1.8"
          $llvmUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/LLVM-$llvmVersion-woa64.exe"
          $llvmPath = "C:\LLVM"
          Invoke-WebRequest -Uri $llvmUrl -OutFile "$env:TEMP\llvm-arm64.exe"
          & "C:\Program Files\7-Zip\7z.exe" x "$env:TEMP\llvm-arm64.exe" -o"$llvmPath" -y
          "$llvmPath\bin" >> $Env:GITHUB_PATH
      # Note: Cygwin is no longer needed - ICU is now built with MSBuild
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.build_ref }}
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !LayoutTests/
            !JSTests/
      - name: Build WebKit
        run: |
          if ("${{matrix.platform}}" -eq "ARM64") {
            $env:Path = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\arm64\;" + $env:Path
          } else {
            $env:Path = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\;" + $env:Path
          }
          $env:WEBKIT_OUTPUT_DIR = "bun-webkit"
          $env:BUN_WEBKIT_VERSION = "${{ inputs.build_ref }}"
          $env:CMAKE_BUILD_TYPE = "${{matrix.build-type}}"
          $env:PACKAGE_JSON_LABEL = "${{matrix.label}}"
          $env:GITHUB_SHA = "${{ inputs.build_ref }}"
          $env:PACKAGE_JSON_ARCH = "${{matrix.package_json_arch}}"
          $env:GITHUB_REPOSITORY = "${{ github.repository }}"
          $Baseline = "${{ matrix.baseline }}" -eq "true"
          ./windows-release.ps1 -Platform ${{matrix.platform}} -Baseline:$Baseline
      - uses: actions/upload-artifact@v4
        with:
          name: ${{matrix.label}}
          path: bun-webkit.tar.gz

  linux-musl:
    name: Linux musl
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        include:
          - lto_flag: ""
            label: bun-webkit-linux-amd64-musl-debug
            os: linux-x64-gh
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "Debug"
          - lto_flag: ""
            label: bun-webkit-linux-arm64-musl-debug
            os: linux-arm64-gh
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: "Debug"
          - lto_flag: "-flto=full -fwhole-program-vtables -fforce-emit-vtables"
            label: bun-webkit-linux-arm64-musl-lto
            os: linux-arm64-gh
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: "MinSizeRel"
          - lto_flag: ""
            label: bun-webkit-linux-arm64-musl
            os: linux-arm64-gh
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: "MinSizeRel"
          - lto_flag: "-flto=full -fwhole-program-vtables -fforce-emit-vtables"
            label: bun-webkit-linux-amd64-musl-lto
            os: linux-x64-gh
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "MinSizeRel"
          - lto_flag: ""
            label: bun-webkit-linux-amd64-musl
            os: linux-x64-gh
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "MinSizeRel"
          - lto_flag: "-flto=full -fwhole-program-vtables -fforce-emit-vtables"
            label: bun-webkit-linux-amd64-musl-baseline-lto
            os: linux-x64-gh
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "MinSizeRel"
            MARCH_FLAG: "-march=nehalem"
          - lto_flag: ""
            label: bun-webkit-linux-amd64-musl-baseline
            os: linux-x64-gh
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "MinSizeRel"
            MARCH_FLAG: "-march=nehalem"
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.build_ref }}
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !LayoutTests/
            !JSTests/
      - uses: docker/setup-buildx-action@v2
        id: buildx
        with:
          install: true
      - name: Run
        run: |
          rm -rf ${{runner.temp}}/bun-webkit ${{runner.temp}}/bun-webkit.tar.gz
          if [ "${{matrix.package_json_arch}}" = "arm64" ]; then
            export MARCH_FLAG="-march=armv8-a+crc -mtune=ampere1"
          else
            export MARCH_FLAG="${{ matrix.MARCH_FLAG || '-march=haswell' }}"
          fi
          WEBKIT_RELEASE_TYPE=${{matrix.CMAKE_BUILD_TYPE}} CPU="native" cpu=native LTO_FLAG="${{matrix.lto_flag}}" temp=${{runner.temp}} bash musl-release.sh
          cd ${{runner.temp}}
          echo "#define BUN_WEBKIT_VERSION \"${{ inputs.build_ref }}\"" >> bun-webkit/include/cmakeconfig.h
          echo '{ "name": "${{matrix.label}}", "version": "0.0.1-${{ inputs.build_ref }}", "os": ["linux"], "cpu": ["${{matrix.package_json_arch}}"], "repository": "https://github.com/${{github.repository}}" }' > bun-webkit/package.json
          rm -rf bun-webkit/lib/*.so
          rm -rf bun-webkit/lib/*.so.*
          tar -czf bun-webkit.tar.gz bun-webkit
          rm -rf bun-webkit
      - uses: actions/upload-artifact@v4
        with:
          name: ${{matrix.label}}
          path: ${{runner.temp}}/bun-webkit.tar.gz

  freebsd:
    name: FreeBSD
    # Cross-compiled from a Linux host via clang --target + base.txz sysroot,
    # so all FreeBSD targets build on x64 regardless of target arch.
    runs-on: linux-x64-gh
    strategy:
      matrix:
        include:
          - label: bun-webkit-freebsd-amd64
            freebsd_arch: x86_64
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "Release"
          - label: bun-webkit-freebsd-amd64-debug
            freebsd_arch: x86_64
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "Debug"
          - label: bun-webkit-freebsd-arm64
            freebsd_arch: aarch64
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: "Release"
          - label: bun-webkit-freebsd-arm64-debug
            freebsd_arch: aarch64
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: "Debug"
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.build_ref }}
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !LayoutTests/
            !JSTests/
      - uses: docker/setup-buildx-action@v2
        id: buildx
        with:
          install: true
      - name: Run
        run: |
          rm -rf ${{runner.temp}}/bun-webkit ${{runner.temp}}/bun-webkit.tar.gz
          FREEBSD_ARCH="${{matrix.freebsd_arch}}" WEBKIT_RELEASE_TYPE="${{matrix.CMAKE_BUILD_TYPE}}" temp=${{runner.temp}} bash freebsd-release.sh
          cd ${{runner.temp}}
          echo "#define BUN_WEBKIT_VERSION \"${{ inputs.build_ref }}\"" >> bun-webkit/include/cmakeconfig.h
          echo '{ "name": "${{matrix.label}}", "version": "0.0.1-${{ inputs.build_ref }}", "os": ["freebsd"], "cpu": ["${{matrix.package_json_arch}}"], "repository": "https://github.com/${{github.repository}}" }' > bun-webkit/package.json
          rm -rf bun-webkit/lib/*.so bun-webkit/lib/*.so.*
          tar -czf bun-webkit.tar.gz bun-webkit
          rm -rf bun-webkit
      - uses: actions/upload-artifact@v4
        with:
          name: ${{matrix.label}}
          path: ${{runner.temp}}/bun-webkit.tar.gz

  linux-android:
    name: Linux Android
    # NDK only ships linux-x86_64 prebuilts, so all Android targets
    # cross-compile from x64 regardless of target arch.
    runs-on: linux-x64-gh
    strategy:
      matrix:
        include:
          - label: bun-webkit-linux-arm64-android
            android_arch: aarch64
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: "Release"
          - label: bun-webkit-linux-arm64-android-debug
            android_arch: aarch64
            package_json_arch: "arm64"
            CMAKE_BUILD_TYPE: "Debug"
          - label: bun-webkit-linux-amd64-android
            android_arch: x86_64
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "Release"
          - label: bun-webkit-linux-amd64-android-debug
            android_arch: x86_64
            package_json_arch: "x64"
            CMAKE_BUILD_TYPE: "Debug"
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.build_ref }}
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !LayoutTests/
            !JSTests/
      - uses: docker/setup-buildx-action@v2
        id: buildx
        with:
          install: true
      - name: Run
        run: |
          rm -rf ${{runner.temp}}/bun-webkit ${{runner.temp}}/bun-webkit.tar.gz
          ANDROID_ARCH="${{matrix.android_arch}}" WEBKIT_RELEASE_TYPE="${{matrix.CMAKE_BUILD_TYPE}}" temp=${{runner.temp}} bash android-release.sh
          cd ${{runner.temp}}
          echo "#define BUN_WEBKIT_VERSION \"${{ inputs.build_ref }}\"" >> bun-webkit/include/cmakeconfig.h
          echo '{ "name": "${{matrix.label}}", "version": "0.0.1-${{ inputs.build_ref }}", "os": ["android"], "cpu": ["${{matrix.package_json_arch}}"], "repository": "https://github.com/${{github.repository}}" }' > bun-webkit/package.json
          rm -rf bun-webkit/lib/*.so bun-webkit/lib/*.so.*
          tar -czf bun-webkit.tar.gz bun-webkit
          rm -rf bun-webkit
      - uses: actions/upload-artifact@v4
        with:
          name: ${{matrix.label}}
          path: ${{runner.temp}}/bun-webkit.tar.gz

  release:
    name: release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - linux
      - macos
      - windows
      - linux-musl
      - linux-android
      - freebsd
    outputs:
      tag: ${{ steps.release_info.outputs.tag }}
    steps:
      - run: uname -a
      - run: free
      - run: env
      - run: mount
      - run: lscpu
      - run: lsmem
      - run: lsblk
      - run: lspci
      - run: lsipc
      - run: whoami
      - uses: actions/download-artifact@v4
        with:
          name: bun-webkit-linux-amd64
          path: ${{runner.temp}}/bun-webkit-linux-amd64
      - uses: actions/download-artifact@v4
        with:
          name: bun-webkit-linux-arm64
          path: ${{runner.temp}}/bun-webkit-linux-arm64
      - uses: actions/download-artifact@v4
        with:
          name: bun-webkit-linux-amd64-debug
          path: ${{runner.temp}}/bun-webkit-linux-amd64-debug
      - uses: actions/download-artifact@v4
        with:
          name: bun-webkit-linux-amd64-debug-asan
          path: ${{runner.temp}}/bun-webkit-linux-amd64-debug-asan
      - uses: actions/download-artifact@v4
        with:
          name: bun-webkit-linux-arm64-debug
          path: ${{runner.temp}}/bun-webkit-linux-arm64-debug
      - uses: actions/download-artifact@v4
        with:
          name: bun-webkit-linux-arm64-debug-asan
          path: ${{runner.temp}}/bun-webkit-linux-arm64-debug-asan
      - uses: actions/download-artifact@v4
        with:
          name: bun-webkit-macos-arm64
          path: ${{runner.temp}}/bun-webkit-macos-arm64
      - uses: actions/download-artifact@v4
        with:
          name: bun-webkit-macos-arm64-asan
          path: ${{runner.temp}}/bun-webkit-macos-arm64-asan
      - uses: actions/download-artifact@v4
        with:
          name: bun-webkit-macos-arm64-debug
          path: ${{runner.temp}}/bun-webkit-macos-arm64-debug
      - uses: actions/download-artifact@v4
        with:
          name: bun-webkit-macos-arm64-debug-asan
          path: ${{runner.temp}}/bun-webkit-macos-arm64-debug-asan
      - uses: actions/download-artifact@v4
        with:
